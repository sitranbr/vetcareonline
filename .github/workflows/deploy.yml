name: Deploy (Droplet)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (Vite)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # Envia apenas o dist/ para o servidor (evita OOM no Droplet)
      - name: Upload dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "dist/*"
          target: "/tmp/vetcareonline-dist"
          strip_components: 1

      - name: Publish on server (Nginx)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 10m
          timeout: 2m
          script: |
            set -e

            # Em GitHub Actions não há TTY; se o usuário não tiver sudo sem senha, o deploy falha.
            # Se estiver logado como root, SUDO fica vazio; caso contrário usa "sudo -n" (sem prompt).
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              SUDO="sudo -n"
            fi

            $SUDO mkdir -p /var/www/medvetpiquet.com.br/painel
            $SUDO rsync -av --delete /tmp/vetcareonline-dist/ /var/www/medvetpiquet.com.br/painel/
            $SUDO rm -rf /tmp/vetcareonline-dist

            $SUDO nginx -t
            $SUDO systemctl reload nginx